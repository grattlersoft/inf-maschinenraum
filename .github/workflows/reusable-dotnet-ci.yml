name: Reusable .NET CI

on:
  workflow_call:
    inputs:
      solution:
        description: Pfad zur .slnx Datei
        required: true
        type: string
      dotnet-version:
        description: .NET SDK Version
        required: false
        type: string
        default: '9.0.x'

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore
        run: dotnet restore ${{ inputs.solution }}

      - name: Build
        run: dotnet build ${{ inputs.solution }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ inputs.solution }} --no-build --configuration Release --verbosity normal
