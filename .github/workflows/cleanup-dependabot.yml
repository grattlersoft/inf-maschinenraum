name: Cleanup Dependabot PRs

# Laeuft taeglich VOR dem Dependabot-Run.
# Schliesst alle offenen Dependabot-PRs und loescht deren Branches.
# Dependabot erstellt danach einen neuen, aktuellen PR.
#
# Ergebnis: Immer nur 1 aktueller Dependabot-PR, kein Muell.

on:
  schedule:
    - cron: "50 1 * * *"  # 01:50 UTC (03:50 CET) — vor Dependabot-Lauf
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Offene Dependabot-PRs schliessen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          prs=$(gh pr list --repo "$GH_REPO" --author "dependabot[bot]" --state open --json number --jq '.[].number')
          if [ -z "$prs" ]; then
            echo "Keine offenen Dependabot-PRs gefunden."
            exit 0
          fi
          for pr in $prs; do
            echo "Schliesse PR #$pr und loesche Branch"
            gh pr close "$pr" --repo "$GH_REPO" --delete-branch
          done
