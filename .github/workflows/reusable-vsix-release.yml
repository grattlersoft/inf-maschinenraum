name: Reusable VSIX Release

on:
  workflow_call:
    inputs:
      solution:
        description: Pfad zur .slnx Datei
        required: true
        type: string
      vsix-glob:
        description: Glob-Pattern fuer .vsix Dateien
        required: false
        type: string
        default: 'src/**/bin/Release/*.vsix'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: nuget restore ${{ inputs.solution }}

      - name: Build Release
        # DeployExtension=false ueberspringt den DeployVsixExtensionFiles-Target,
        # der nur fuer lokales VS-Debugging sinnvoll ist und in CI mit VSSDK1031 bricht.
        run: msbuild ${{ inputs.solution }} /p:Configuration=Release /p:DeployExtension=false /v:minimal

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ inputs.vsix-glob }}
